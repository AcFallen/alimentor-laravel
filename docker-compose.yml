services:
  mysql:
    image: mysql:8.0
    container_name: alimentor_mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: alimentor_laravel
      MYSQL_USER: alimentor
      MYSQL_PASSWORD: secret
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgsql:
    image: postgres:14
    container_name: alimentor_pgsql
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: alimentor_backup
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    volumes:
      - pgsql_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d alimentor_backup"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
  pgsql_data:
